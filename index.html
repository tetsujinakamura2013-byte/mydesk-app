<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>マイディスクへ戻る</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1565ff">

<link rel="apple-touch-icon" href="icon.png">

<style>

body{
    margin:0;
    padding:0;
    background:#f0f4ff;
    font-family:sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:90%;
    max-width:450px;
    background:white;
    border-radius:30px;
    padding:40px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}
.logo img{

    width:120px;
    height:120px;
    border-radius:25px;
    margin-bottom:25px;
}
h1{
    font-size:44px;
    color:#333;
    line-height:1.5;
    margin-bottom:50px;
}

button{
    width:100%;
    border:none;
    border-radius:25px;
    padding:28px;
    margin-top:25px;
    font-size:34px;
    font-weight:bold;
    color:white;
    cursor:pointer;
}

button:active{
    transform:scale(0.97);
}

.search-btn{
    background:#1565ff;
}

.exit-btn{
    background:#666;
}

.message{
    margin-top:40px;
    font-size:22px;
    color:#555;
    line-height:1.8;
}

.closed{
    display:none;
    font-size:40px;
    color:#444;
    line-height:2;
}

</style>

</head>

<body>

<div class="container" id="mainScreen">

<div class="logo">

    <img src="icon.png" alt="logo">

</div>

<h1>

    マイディスクへ帰る

</h1>
    <button class="search-btn" onclick="searchRoute()">
        🔍 検索
    </button>

    <button class="exit-btn" onclick="closeApp()">
        ❌ 終了
    </button>

    <div class="message">

        現在地から<br>
        Googleマップで<br>
        最適な帰路を検索します

    </div>

</div>

<div class="closed" id="closedScreen">

    アプリを<br>
    終了しました

</div>

<script>

const destination =
encodeURIComponent("愛知県名古屋市中村区名駅3丁目22-8");

function searchRoute(){

    if(!navigator.geolocation){

        alert("GPS非対応です");
        return;
    }

    navigator.geolocation.getCurrentPosition(

        function(position){

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            const url =
            `https://www.google.com/maps/dir/?api=1&origin=${lat},${lng}&destination=${destination}&travelmode=transit`;

            window.location.href = url;
        },

        function(){

            alert(
                "位置情報を取得できませんでした。\\n\\n位置情報をONにしてください。"
            );
        },

        {
            enableHighAccuracy:true,
            timeout:10000,
            maximumAge:0
        }
    );
}

function closeApp(){

    document.getElementById("mainScreen").style.display = "none";

    document.getElementById("closedScreen").style.display = "block";
}

// PWA
if('serviceWorker' in navigator){

    navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
